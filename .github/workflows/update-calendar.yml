# .github/workflows/update-calendar.yml
# Runs the JMHS Band calendar scraper daily and publishes the .ics via GitHub Pages.

name: Update JMHS Band Calendar

on:
  schedule:
    # Run daily at 6:00 AM Eastern (11:00 UTC during EDT, 10:00 UTC during EST)
    - cron: "0 11 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_jmhs_band.py

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jmhs_band_calendar.ics
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to calendar. Skipping commit."
          else
            git commit -m "Update calendar $(date -u +%Y-%m-%d)"
            git push
          fi
